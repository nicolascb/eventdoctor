name: Release Frontend

on:
  push:
    tags:
      - "frontend/v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Frontend Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#frontend/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/nicolascb/eventdoctor-ui:${{ steps.version.outputs.value }}
            ghcr.io/nicolascb/eventdoctor-ui:latest
          labels: |
            org.opencontainers.image.title=eventdoctor-ui
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.source=https://github.com/nicolascb/eventdoctor
          build-args: |
            VITE_API_URL=http://localhost:8087/v1
