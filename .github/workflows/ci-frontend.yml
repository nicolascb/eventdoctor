# On PRs: jobs only run if a maintainer adds the "ci-approved" label.
# On push to main: jobs run automatically.

name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  pull_request:
    types: [labeled, synchronize]
    branches: [main]
    paths:
      - "frontend/**"

permissions:
  contents: read

jobs:
  build:
    name: Build
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci-approved')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  security:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: fs
          scan-ref: ./frontend
          exit-code: "1"
          severity: CRITICAL,HIGH
