# NOTE: For PR manual approval, create a GitHub environment named "ci-approval"
# in repo settings (Settings > Environments) and add the project owner as required reviewer.

name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && 'ci-approval' || '' }}
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: CGO_ENABLED=1 go test -v -race ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Download dependencies
        run: go mod download
      - name: Build API
        run: CGO_ENABLED=1 go build -o eventdoctor ./cmd/api/main.go
      - name: Build CLI
        run: CGO_ENABLED=0 go build -o eventdoctor-cli ./cmd/cli/main.go

  security:
    name: Security Scan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          exit-code: "1"
          severity: CRITICAL,HIGH
