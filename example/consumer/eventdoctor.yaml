version: "1.0"

service: "basic-service"
config:
  servers:
    - environment: "development"
      url: "http://localhost:8087"
    - environment: "production"
      url: "https://eventdoctor.empresa.com"
  repository: "https://github.com/empresa/consumer-service"

consumers:
  - group: "basic-group"
    description: "Service responsible for push notifications"
    topics:
      - name: "order-microservice.events"
        events:
          - type: "OrderCreated"
            version: "1.0.0"
          - type: "OrderCancelled"
            version: "1.0.0"
      - name: "push.commands"
        events:
          - type: "BasicCreated"
            version: "1.0.0"
          - type: "BasicDeleted"
            version: "1.0.0"
